<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maxime CORBY — Side Projects</title>
  <link rel="icon" type="image/png" href="assets/about/photo.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <ul class="nav-links">
    <li><a href="index.html">Main Projects</a></li>
    <li><a href="side-projects.html">Side Projects</a></li>
    <li><a href="about.html">About Me</a></li>
  </ul>
</nav>

<main class="page">
  <div class="section-title reveal">Side Projects</div>
  <div class="project-grid three-col" id="side-grid"></div>
</main>

<footer>
  <span>© 2025 Maxime Corby</span>
</footer>
<div class="back-top">↑</div>

<script src="main.js"></script>
<script>
async function buildGrid() {
  const data = await fetch('projects.json').then(r => r.json());
  const grid = document.getElementById('side-grid');
  data.projects.filter(p => p.category === 'side').forEach((p, i) => {
    const techBadges = techBadgeHTML(p.technologies, 'tech-badge');

    const a = document.createElement('a');
    a.href = `project.html?id=${p.id}`;
    a.className = 'card reveal';
    a.innerHTML = `
      <div class="card-thumb">
        ${buildThumb(p)}
      </div>
      <div class="card-body">
        <div class="card-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-meta">${p.engine} · ${p.genre} · ${p.duration} · ${p.teamSize}</div>
        <div class="card-role">My job : ${p.role}</div>
        <div class="card-tech-row">${techBadges}</div>
      </div>`;
    grid.appendChild(a);
  });
  revealAll(grid);
}
buildGrid();
</script>
</body>
</html>
