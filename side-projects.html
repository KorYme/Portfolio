<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxime CORBY — Side Projects</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">Maxime Corby</a>
    <ul class="nav-links">
      <li><a href="index.html">Main Projects</a></li>
      <li><a href="about.html">About Me</a></li>
    </ul>
  </nav>

  <main class="page">
    <div class="section-label reveal"><span>Side Projects</span></div>
    <div class="project-grid three-col" id="side-grid"></div>
  </main>

  <footer>
    <span>© 2025 Maxime Corby</span>
    <nav class="footer-links">
      <a href="index.html">Main Projects</a>
      <a href="side-projects.html">Side Projects</a>
      <a href="about.html">About Me</a>
    </nav>
  </footer>
  <a class="back-top" title="Back to top">↑</a>

  <script src="main.js"></script>
  <script>
    async function buildGrid() {
      const res  = await fetch('projects.json');
      const data = await res.json();
      const side = data.projects.filter(p => p.category === 'side');
      const grid = document.getElementById('side-grid');

      side.forEach((p, i) => {
        const a = document.createElement('a');
        a.href = `project.html?id=${p.id}`;
        a.className = 'card reveal';

        let thumbHTML = `<div class="thumb-ph">[ ${p.title} ]</div>`;
        if (p.thumbnail) {
          if (p.thumbnailGif) {
            thumbHTML = `
              <img class="img-still" src="${p.thumbnail}"   alt="${p.title}" loading="lazy">
              <img class="img-gif"   src="${p.thumbnailGif}" alt="${p.title}" loading="lazy">`;
          } else {
            thumbHTML = `<img class="img-still" src="${p.thumbnail}" alt="${p.title}" loading="lazy">`;
          }
        }

        a.innerHTML = `
          <div class="card-thumb">
            ${thumbHTML}
            <span class="card-arrow">View →</span>
          </div>
          <div class="card-body">
            <div class="card-index">${String(i+1).padStart(2,'0')}</div>
            <div class="card-title">${p.title}</div>
            <div class="card-meta">${p.engine} · ${p.genre} · ${p.duration} · ${p.teamSize}</div>
            <div class="card-role">My job : ${p.role}</div>
          </div>`;
        grid.appendChild(a);
      });

      const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
      }, { threshold: 0.06 });
      grid.querySelectorAll('.reveal').forEach(el => io.observe(el));
    }
    buildGrid();
  </script>
</body>
</html>
