<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maxime CORBY — Side Projects</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Maxime Corby</a>
  <ul class="nav-links">
    <li><a href="index.html">Main Projects</a></li>
    <li><a href="side-projects.html">Side Projects</a></li>
    <li><a href="about.html">About Me</a></li>
  </ul>
</nav>

<main class="page">
  <div class="section-title reveal">Side Projects</div>
  <div class="project-grid three-col" id="side-grid"></div>
</main>

<footer>
  <span>© 2025 Maxime Corby</span>
  <nav class="footer-links">
    <a href="index.html">Main Projects</a>
    <a href="side-projects.html">Side Projects</a>
    <a href="about.html">About Me</a>
  </nav>
</footer>
<div class="back-top">↑</div>

<script src="main.js"></script>
<script>
async function buildGrid() {
  const data = await fetch('projects.json').then(r => r.json());
  const grid = document.getElementById('side-grid');
  data.projects.filter(p => p.category === 'side').forEach((p, i) => {
    let thumb = `<div class="thumb-ph">[ ${p.title} ]</div>`;
    if (p.thumbnail) {
      thumb = p.thumbnailGif
        ? `<img class="img-still" src="${p.thumbnail}" alt="${p.title}" loading="lazy">
           <img class="img-gif"   src="${p.thumbnailGif}" alt="${p.title}" loading="lazy">`
        : `<img class="img-still" src="${p.thumbnail}" alt="${p.title}" loading="lazy">`;
    }
    const techChips = (p.technologies||[]).map(t =>
      `<span class="chip">${getTechIcon(t)}<span>${t}</span></span>`).join('');
    const techBadges = techBadgeHTML(p.technologies, 'tech-badge');

    const a = document.createElement('a');
    a.href = `project.html?id=${p.id}`;
    a.className = 'card reveal';
    a.innerHTML = `
      <div class="card-thumb">
        ${thumb}
        <div class="card-overlay">
          <div class="card-overlay-title">${p.title}</div>
          <div class="card-overlay-meta">${p.engine} · ${p.genre} · ${p.duration}</div>
          <div class="card-overlay-role">My job : ${p.role}</div>
          <div class="card-overlay-techs">${techChips}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-meta">${p.engine} · ${p.genre} · ${p.duration} · ${p.teamSize}</div>
        <div class="card-role">My job : ${p.role}</div>
        <div class="card-tech-row">${techBadges}</div>
      </div>`;
    grid.appendChild(a);
  });
  revealAll(grid);
}
buildGrid();
</script>
</body>
</html>
