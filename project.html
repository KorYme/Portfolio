<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maxime CORBY — Project</title>
  <link rel="icon" type="image/png" href="assets/about/photo.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <ul class="nav-links">
    <li><a href="index.html">Main Projects</a></li>
    <li><a href="side-projects.html">Side Projects</a></li>
    <li><a href="about.html">About Me</a></li>
  </ul>
</nav>

<main class="page" id="proj-page">
  <p style="padding-top:80px;color:var(--muted);font-size:.75rem">Loading…</p>
</main>

<footer>
  <span>© 2025 Maxime Corby</span>
</footer>
<div class="back-top">↑</div>

<script src="main.js"></script>
<script>
/* ── helpers ─────────────────────────────────────── */
function relatedCard(p, i) {
  let thumb = `<div class="thumb-ph">[ ${p.title} ]</div>`;
  if (p.thumbnail) {
    if (p.thumbnailGif) {
      thumb = `<img class="img-still" src="${p.thumbnail}" alt="${p.title}" loading="lazy">
             <img class="img-gif"   src="${p.thumbnailGif}" alt="${p.title}" loading="lazy">`;
    } else {
      thumb = `<img src="${p.thumbnail}" alt="${p.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;">`;
    }
  }

  return `
    <a href="project.html?id=${p.id}" class="card reveal rd${i+1}">
      <div class="card-thumb">
        ${buildThumb(p)}
      </div>
      <div class="card-body">
        <div class="card-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-meta">${p.engine} · ${p.genre} · ${p.duration}</div>
        <div class="card-role">My job : ${p.role}</div>
      </div>
    </a>`;
}

/* ── main render ─────────────────────────────────── */
async function render() {
  const id   = new URLSearchParams(location.search).get('id');
  const data = await fetch('projects.json').then(r => r.json());
  const all  = data.projects;
  const p    = all.find(x => x.id === id);
  const page = document.getElementById('proj-page');

  if (!p) {
    page.innerHTML = `<div style="padding-top:100px;text-align:center;color:var(--muted)">
      <p>Project not found.</p>
      <a href="index.html" style="color:var(--text);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;margin-top:16px;display:inline-block">← Back</a>
    </div>`;
    return;
  }

  document.title = `Maxime CORBY — ${p.title}`;
  const backHref = p.category === 'side' ? 'side-projects.html' : 'index.html';

  /* YouTube — optional */
  const ytHTML = p.youtubeId ? `
    <div class="yt-wrap reveal">
      <h3>Trailer</h3>
      <div class="yt-frame">
        <iframe
          src="https://www.youtube.com/embed/${p.youtubeId}"
          title="${p.title} — Trailer"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>` : '';

  /* sections */
  const sectionsHTML = (p.sections||[]).map((s, i) => `
    <div class="proj-section reveal">
      <div class="proj-section-inner">
        <div class="proj-section-label">
          <span class="s-num">${String(i+1).padStart(2,'0')}</span>
          <h2>${s.title}</h2>
        </div>
        <div class="proj-section-content">
          <p>${parseMarkdown(s.body)}</p>
          ${renderImgs(s.images)}
        </div>
      </div>
    </div>`).join('');

  /* related */
  const rels = (p.related||[]).map(rid => all.find(x => x.id === rid)).filter(Boolean).slice(0,3);
  const relatedHTML = rels.length ? `
    <div class="related reveal">
      <div class="section-title">You may also like</div>
      <div class="project-grid" style="grid-template-columns:repeat(${rels.length},1fr)">
        ${rels.map((r,i) => relatedCard(r,i)).join('')}
      </div>
    </div>` : '';

  /* tech tags with icons */
  const techTagsHTML = techBadgeHTML(p.technologies, 'tech-tag');

  const validLinks = (p.links || []).filter(l => l.url && l.url.trim() !== '');
  const linkHTML = validLinks.length ? `
  <div style="margin-top: 20px;">
    <h3 style="font-family:var(--fs);font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Links</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      ${validLinks.map(l => `
        <a href="${l.url}" target="_blank" rel="noopener" class="btn btn-link">${l.label} ↗</a>
      `).join('')}
    </div>
  </div>` : '';

  page.innerHTML = `
    <!-- Header -->
    <header class="proj-header reveal">
      <a href="${backHref}" class="proj-back">← Back to projects</a>
      <div class="proj-meta-row">
        <span class="proj-year">${p.year}</span>
        ${p.status ? `<span class="proj-badge">${p.status}</span>` : ''}
      </div>
      <h1>${p.title}</h1>
      <p class="proj-tagline">${p.tagline}</p>
      <div class="proj-specs">
        <span><strong>${p.engine}</strong></span>
        <span>${p.genre}</span>
        <span>${p.duration}</span>
        <span>${p.teamSize}</span>
      </div>
    </header>

    <!-- Context -->
    <div class="proj-ctx reveal">
      <div>
        <h3>Context</h3>
        <p>${p.context}<br><br>
          <strong style="color:var(--text)">Team :</strong> ${p.team}<br>
          <strong style="color:var(--text)">My role :</strong> ${p.role}
        </p>
      </div>
      <div>
        <h3>Technologies</h3>
        <div class="tech-tags">${techTagsHTML}</div>
        ${linkHTML}
      </div>
    </div>

    <!-- YouTube trailer (optionnel) -->
    ${ytHTML}

    <!-- Sections -->
    ${sectionsHTML}

    <!-- Related -->
    ${relatedHTML}
  `;

  revealAll(page);
}

render();
</script>
</body>
</html>
