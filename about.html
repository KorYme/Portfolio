<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maxime CORBY — About Me</title>
  <link rel="icon" type="image/png" href="assets/about/photo.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <ul class="nav-links">
    <li><a href="index.html">Main Projects</a></li>
    <li><a href="side-projects.html">Side Projects</a></li>
    <li><a href="about.html">About Me</a></li>
  </ul>
</nav>

<main class="page">
  <div class="about-layout" id="about-layout"></div>
</main>

<footer>
  <span>© 2025 Maxime Corby</span>
</footer>
<div class="back-top">↑</div>

<script src="main.js"></script>
<script>
  async function buildAbout() {
    const data = await fetch('projects.json').then(r => r.json());
    const a    = data.about;
    const layout = document.getElementById('about-layout');

    const portraitHTML = a.photo
            ? `<div class="portrait-wrap"><img src="${a.photo}" alt="${a.name}"></div>`
            : `<div class="portrait-ph">[ Photo ]</div>`;

    const contactsHTML = (a.contacts || []).map(c =>
            `<a href="${c.url}" target="_blank" rel="noopener">${c.label}${c.arrow ? ' ↗' : ''}</a>`
    ).join('');

    const sectionsHTML = (a.sections || []).map(s =>
            `<h3>${s.title}</h3><p>${s.text}</p>`
    ).join('');

    const skillsHTML = techBadgeHTML(a.skills, 'tech-tag');

    let canvaHTML = '';
    if (a.canvaEmbedUrl && a.canvaEmbedUrl.trim() !== '') {
      canvaHTML = `
      <div class="canva-wrap reveal">
        <h3>Curriculum Vitae</h3>
        <div class="canva-frame">
          <iframe src="${a.canvaEmbedUrl}" allowfullscreen allow="fullscreen *;"></iframe>
        </div>
      </div>`;
    }

    layout.innerHTML = `
    <aside class="about-left reveal">
      ${portraitHTML}
      <div>
        <p class="about-name">${a.name}</p>
        <p class="about-role">${a.role}</p>
        <div class="about-contacts">${contactsHTML}</div>
      </div>
    </aside>

    <div class="about-right reveal rd1">
      ${sectionsHTML}
      <h3>Skills</h3>
      <div class="tech-tags">${skillsHTML}</div>
      ${canvaHTML}
    </div>`;

    revealAll(layout);
  }
buildAbout();
</script>
</body>
</html>
