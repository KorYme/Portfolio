<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maxime CORBY — About Me</title>
  <link rel="icon" type="image/png" href="assets/about/photo.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Maxime Corby</a>
  <ul class="nav-links">
    <li><a href="index.html">Main Projects</a></li>
    <li><a href="side-projects.html">Side Projects</a></li>
    <li><a href="about.html">About Me</a></li>
  </ul>
</nav>

<main class="page">
  <div class="about-layout" id="about-layout"></div>
</main>

<footer>
  <span>© 2025 Maxime Corby</span>
  <nav class="footer-links">
    <a href="index.html">Main Projects</a>
    <a href="side-projects.html">Side Projects</a>
    <a href="about.html">About Me</a>
  </nav>
</footer>
<div class="back-top">↑</div>

<script src="main.js"></script>
<script>
async function buildAbout() {
  const data = await fetch('projects.json').then(r => r.json());
  const a    = data.about;
  const layout = document.getElementById('about-layout');

  /* Portrait — toujours carré (aspect-ratio 1/1 dans CSS) */
  const portraitHTML = a.photo
    ? `<div class="portrait-wrap"><img src="${a.photo}" alt="${a.name}"></div>`
    : `<div class="portrait-ph">[ Photo ]</div>`;

  /* Canva embed — optionnel */
  let canvaHTML;
  if (a.canvaEmbedUrl && a.canvaEmbedUrl.trim() !== '') {
    canvaHTML = `
      <div class="canva-wrap reveal">
        <h3>Curriculum Vitae</h3>
        <div class="canva-frame">
          <iframe src="${a.canvaEmbedUrl}" allowfullscreen allow="fullscreen *;"></iframe>
        </div>
      </div>`;
  } else {
    /* Fallback : lien download CV si pas d'embed */
    canvaHTML = '';
  }

  /* Bio paragraphs */
  const bioHTML = (a.bio || []).map(p => `<p>${p}</p>`).join('');

  /* Skills */
  const skillsHTML = techBadgeHTML(a.skills, 'tech-tag');

  layout.innerHTML = `
    <!-- Left : portrait sticky -->
    <aside class="about-left reveal">
      ${portraitHTML}
      <p class="about-name">${a.name}</p>
      <p class="about-role">${a.role}</p>
      <div class="about-contacts">
        ${a.phone ? `<a href="tel:${a.phone.replace(/\s/g,'')}">${a.phone}</a>` : ''}
        ${a.cvUrl ? `<a href="${a.cvUrl}" target="_blank" rel="noopener">Download CV ↗</a>` : ''}
      </div>
    </aside>

    <!-- Right -->
    <div class="about-right reveal rd1">
      <h3>Hello</h3>
      ${bioHTML}

      <h3>LeoIndieGames</h3>
      <p>${a.associations}</p>

      <h3>Skills</h3>
      <div class="tech-tags">${skillsHTML}</div>

      ${canvaHTML}
    </div>`;

  revealAll(layout);
}
buildAbout();
</script>
</body>
</html>
