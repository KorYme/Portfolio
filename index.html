<main class="page">
  <section class="hero reveal">
    <p class="hero-label">Portfolio — Game Dev</p>

</main>

<footer>
  <span>© 2025 Maxime Corby</span>
</footer>
<div class="back-top">↑</div>

<script src="main.js"></script>
<script>
async function buildGrid() {
  const data = await fetch('projects.json').then(r => r.json());
  const grid = document.getElementById('main-grid');
  data.projects.filter(p => p.category === 'main').forEach((p, i) => {
    const techBadges = techBadgeHTML(p.technologies, 'tech-badge');
    const computedRole = (p.role && p.role.trim() !== '')
            ? p.role
            : (p.sections || []).map(s => s.title).join(', ');

    const a = document.createElement('a');
    a.href = `project.html?id=${p.id}`;
    a.className = 'card reveal' + (i>0 ? ` rd${Math.min(i,3)}` : '');
    a.innerHTML = `
      <div class="card-thumb">
        ${buildThumb(p)}
      </div>
      <div class="card-body">
        <div class="card-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-meta">${p.engine} · ${p.genre} · ${p.duration} · ${p.teamSize}</div>
        <div class="card-role">${computedRole}</div>
        <div class="card-tech-row">${techBadges}</div>
      </div>`;
    grid.appendChild(a);
  });
  revealAll(grid);
}
buildGrid();
</script>
</body>
</html>
